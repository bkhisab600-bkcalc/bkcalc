<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WhatsApp Calc</title>
  <meta name="theme-color" content="#f5f7fb" id="themeColorMeta">

  <script>
    (function () {
      const savedTheme = localStorage.getItem("calc_theme") || "theme-light";
      document.documentElement.classList.add(savedTheme);
      document.documentElement.style.backgroundColor =
        savedTheme === "theme-dark" ? "#000000" : "#f5f7fb";
    })();
  </script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html.theme-dark{
      --bg:#000;
      --surface:#000;
      --line:#1b1f2a;
      --btn:#0a0d14;
      --btn-active:#151b25;
      --text:#ffffff;
      --muted:#eef4ff;
      --operator:#78c8ff;
      --operator-soft:#8ef0c4;
      --danger:#ff92b0;
      --equal-bg:#f1f3ff;
      --equal-text:#111;
      --banner-bg:#e8ddf3;
      --banner-text:#72697d;
      --top-btn-bg:#173050;
      --top-btn-bg-2:#234d82;
      --top-btn-border:#39659f;
      --top-btn-text:#e3f1ff;
      --menu-bg:#111722;
      --menu-hover:#1b2433;
      --result-copy-bg:#111722;
      --result-copy-border:#2f3f5b;
    }

    html.theme-light{
      --bg:#f5f7fb;
      --surface:#ffffff;
      --line:#d9e0ec;
      --btn:#ffffff;
      --btn-active:#edf2f9;
      --text:#101623;
      --muted:#31415d;
      --operator:#0a84ff;
      --operator-soft:#1e9b63;
      --danger:#d44b68;
      --equal-bg:#111827;
      --equal-text:#ffffff;
      --banner-bg:#ece7f5;
      --banner-text:#5c5467;
      --top-btn-bg:#bfdcff;
      --top-btn-bg-2:#8bbcff;
      --top-btn-border:#6aa2ef;
      --top-btn-text:#084ea9;
      --menu-bg:#ffffff;
      --menu-hover:#f2f6fc;
      --result-copy-bg:#ffffff;
      --result-copy-border:#cad6ea;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
    }

    body{
      background:var(--bg);
      display:flex;
      justify-content:center;
      align-items:stretch;
      color:var(--text);
      margin:0;
    }

    .app{
      width:100%;
      max-width:520px;
      height:100vh;
      height:100dvh;
      background:var(--bg);
      display:grid;
      grid-template-rows:
        clamp(50px, 7.2dvh, 62px)
        minmax(150px, 1fr)
        clamp(48px, 7dvh, 58px)
        minmax(300px, 43dvh)
        clamp(54px, 7.5dvh, 64px);
      overflow:hidden;
      padding-top:var(--safe-top);
      padding-bottom:var(--safe-bottom);
      position:relative;
    }

    .header{
      border-bottom:1px solid var(--line);
      display:grid;
      grid-template-columns:40px 1fr 40px;
      align-items:center;
      gap:8px;
      padding:0 12px;
      min-width:0;
      position:relative;
      background:var(--bg);
    }

    .icon-btn{
      width:34px;
      height:34px;
      border:none;
      background:transparent;
      color:var(--text);
      font-size:22px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      touch-action:manipulation;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    .icon-btn:active{
      background:var(--menu-hover);
    }

    .title-wrap{
      min-width:0;
      display:flex;
      align-items:center;
    }

    .page-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 18px;
      border-radius:15px;
      border:1px solid var(--top-btn-border);
      background:linear-gradient(180deg, var(--top-btn-bg), var(--top-btn-bg-2));
      color:var(--top-btn-text);
      text-decoration:none;
      font-size:clamp(15px, 3.8vw, 18px);
      font-weight:800;
      white-space:nowrap;
      box-shadow:
        0 1px 0 rgba(255,255,255,.14) inset,
        0 4px 10px rgba(0,0,0,.10);
      touch-action:manipulation;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    .page-btn:active{
      filter:brightness(.98);
    }

    .menu-dropdown{
      position:absolute;
      top:calc(100% + 8px);
      left:12px;
      min-width:180px;
      background:var(--menu-bg);
      border:1px solid var(--line);
      border-radius:14px;
      padding:8px;
      box-shadow:0 10px 22px rgba(0,0,0,.22);
      display:none;
      z-index:30;
    }

    .menu-dropdown.show{
      display:block;
    }

    .menu-item{
      width:100%;
      border:none;
      background:transparent;
      color:var(--text);
      text-align:left;
      padding:12px 14px;
      border-radius:10px;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      touch-action:manipulation;
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    .menu-item:active{
      background:var(--menu-hover);
    }

    .display{
      border-bottom:1px solid var(--line);
      padding:12px 14px 8px;
      display:grid;
      grid-template-rows:minmax(0,1fr) auto;
      gap:8px;
      min-height:0;
      overflow:hidden;
      background:var(--bg);
    }

    .expression-wrap{
      min-height:0;
      overflow:hidden;
      display:flex;
      align-items:flex-end;
      position:relative;
    }

    .expression-view{
      width:100%;
      height:100%;
      overflow-y:auto;
      overflow-x:hidden;
      text-align:right;
      font-family:inherit;
      font-size:clamp(30px, 7vw, 50px);
      font-weight:500;
      line-height:1.18;
      color:var(--muted);
      padding:2px 0;
      scroll-behavior:auto;
      -webkit-overflow-scrolling:touch;
      white-space:normal;
      word-break:normal;
      overflow-wrap:normal;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      cursor:text;
      position:relative;
      scrollbar-width:none;
      -ms-overflow-style:none;
      touch-action:manipulation;
    }

    .expression-view::-webkit-scrollbar{
      width:0;
      height:0;
      display:none;
    }

    .expression-view::-webkit-scrollbar-thumb{
      background:transparent;
    }

    .expression-view::-webkit-scrollbar:horizontal{
      display:none;
      height:0;
    }

    .expr-line{
      display:block;
      width:100%;
      text-align:right;
    }

    .expr-token{
      display:inline-block;
      white-space:nowrap;
    }

    .cursor-overlay{
      position:absolute;
      width:2px;
      background:var(--text);
      border-radius:2px;
      pointer-events:none;
      animation:blink .9s steps(1) infinite;
      z-index:5;
      transform:translateX(-1px);
    }

    .cursor-probe{
      display:inline-block;
      width:0;
      opacity:0;
      pointer-events:none;
      white-space:pre;
      vertical-align:-0.08em;
    }

    @keyframes blink{
      0%,50%{opacity:1}
      51%,100%{opacity:0}
    }

    .result-box{
      min-height:clamp(48px, 7dvh, 60px);
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
      overflow:hidden;
    }

    .result-copy{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border:1px solid var(--result-copy-border);
      border-radius:14px;
      background:var(--result-copy-bg);
      cursor:pointer;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      max-width:100%;
      touch-action:manipulation;
    }

    .result-copy:active{
      opacity:.92;
    }

    .result{
      font-size:clamp(30px, 7vw, 50px);
      line-height:1;
      font-weight:700;
      white-space:nowrap;
      letter-spacing:-0.03em;
      color:var(--text);
      overflow:hidden;
      text-overflow:ellipsis;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    .copy-icon{
      font-size:18px;
      color:var(--operator);
      flex-shrink:0;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    .action-bar{
      border-bottom:1px solid var(--line);
      padding:0 14px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      align-items:center;
      background:var(--surface);
    }

    .action-left{
      justify-self:start;
      color:var(--operator-soft);
      font-size:clamp(22px, 5vw, 28px);
      letter-spacing:5px;
      line-height:1;
      font-weight:800;
    }

    .action-center{
      justify-self:center;
      color:var(--operator-soft);
      font-size:clamp(24px, 5vw, 32px);
      font-weight:800;
      line-height:1;
    }

    .backspace{
      justify-self:end;
      color:var(--operator);
      font-size:clamp(24px, 5vw, 32px);
      font-weight:800;
      line-height:1;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      cursor:pointer;
      touch-action:manipulation;
    }

    .backspace:active{
      opacity:.82;
    }

    .grid{
      min-height:0;
      height:100%;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      grid-template-rows:repeat(5,1fr);
      gap:2px;
      background:var(--line);
    }

    .btn{
      border:none;
      background:var(--btn);
      color:var(--text);
      font-family:inherit;
      font-size:clamp(22px, 6vw, 40px);
      font-weight:500;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:0;
      min-height:0;
      cursor:pointer;
      transition:background .01s linear, transform 0s, color .04s linear;
      touch-action:manipulation;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    .btn:active{
      background:var(--btn-active);
      transform:none;
    }

    .btn.clear{
      color:var(--danger);
      font-weight:800;
    }

    .btn.operator{
      color:var(--operator);
      font-weight:800;
      font-size:clamp(24px, 6.2vw, 42px);
    }

    .btn.operator.soft{
      color:var(--operator-soft);
    }

    .btn.equals{
      background:var(--equal-bg);
      color:var(--equal-text);
      font-weight:800;
    }

    .banner{
      position:relative;
      background:var(--banner-bg);
      border-top:1px solid var(--line);
      color:var(--banner-text);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(14px, 3.6vw, 22px);
      overflow:hidden;
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    .gear{
      position:absolute;
      right:10px;
      width:clamp(34px, 8vw, 42px);
      height:clamp(34px, 8vw, 42px);
      border-radius:12px;
      background:rgba(0,0,0,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(18px, 4vw, 22px);
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(78px + var(--safe-bottom));
      transform:translateX(-50%) translateY(10px);
      background:rgba(17,24,39,.96);
      color:#fff;
      padding:10px 16px;
      border-radius:12px;
      font-size:14px;
      font-weight:700;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      z-index:100;
      box-shadow:0 8px 24px rgba(0,0,0,.22);
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-height:700px){
      .app{
        grid-template-rows:
          48px
          minmax(128px, 1fr)
          46px
          minmax(270px, 44dvh)
          52px;
      }

      .expression-view{
        font-size:clamp(26px, 6vw, 40px);
      }

      .result{
        font-size:clamp(28px, 6.5vw, 42px);
      }
    }

    @media (min-width:700px){
      .app{
        max-width:560px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <button class="icon-btn" id="menuBtn">☰</button>
      <div class="title-wrap">
        <a class="page-btn" href="whatsApp.html">WhatsApp Calc</a>
      </div>
      <button class="icon-btn">⋮</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button class="menu-item" id="themeToggleBtn">Dark Mode</button>
      </div>
    </div>

    <div class="display">
      <div class="expression-wrap">
        <div id="exprView" class="expression-view"></div>
      </div>

      <div class="result-box">
        <div class="result-copy" id="copyResultBtn" title="Copy total">
          <div id="result" class="result">0</div>
          <span class="copy-icon">⧉</span>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <div class="action-left">•••</div>
      <div class="action-center">^</div>
      <div class="backspace" id="backspaceBtn">⌫</div>
    </div>

    <div class="grid">
      <button class="btn clear" data-action="clear">C</button>
      <button class="btn operator soft" data-action="bracket">()</button>
      <button class="btn operator soft" data-action="percent">%</button>
      <button class="btn operator" data-insert="÷">÷</button>

      <button class="btn" data-insert="7">7</button>
      <button class="btn" data-insert="8">8</button>
      <button class="btn" data-insert="9">9</button>
      <button class="btn operator" data-insert="×">×</button>

      <button class="btn" data-insert="4">4</button>
      <button class="btn" data-insert="5">5</button>
      <button class="btn" data-insert="6">6</button>
      <button class="btn operator" data-insert="−">−</button>

      <button class="btn" data-insert="1">1</button>
      <button class="btn" data-insert="2">2</button>
      <button class="btn" data-insert="3">3</button>
      <button class="btn operator" data-insert="+">+</button>

      <button class="btn" data-insert="0">0</button>
      <button class="btn" data-insert="00">00</button>
      <button class="btn" data-action="dot">.</button>
      <button class="btn equals" data-action="equals">=</button>
    </div>

    <div class="banner">
      Banner Ad Space
      <div class="gear">⚙️</div>
    </div>

    <div class="toast" id="toast">Copied</div>
  </div>

  <script>
    const exprView = document.getElementById("exprView");
    const result = document.getElementById("result");
    const copyResultBtn = document.getElementById("copyResultBtn");
    const menuBtn = document.getElementById("menuBtn");
    const menuDropdown = document.getElementById("menuDropdown");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const backspaceBtn = document.getElementById("backspaceBtn");
    const toast = document.getElementById("toast");

    let expression = "";
    let cursorIndex = 0;
    let lastValidResult = "0";
    let toastTimer;

    function showToast(message = "Copied to clipboard"){
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1400);
    }

    function escapeHtml(text){
      return text
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
    }

    function tokenizeExpression(value){
      const tokens = [];
      let i = 0;

      while(i < value.length){
        const ch = value[i];

        if(/\d|\./.test(ch)){
          let num = ch;
          i++;
          while(i < value.length && /[\d.]/.test(value[i])){
            num += value[i];
            i++;
          }
          tokens.push({ text: num, start: i - num.length, end: i });
          continue;
        }

        if(ch === '+' || ch === '−' || ch === '×' || ch === '÷'){
          let j = i + 1;
          let numberPart = "";

          while(j < value.length && /[\d.]/.test(value[j])){
            numberPart += value[j];
            j++;
          }

          if(numberPart){
            const tokenText = ch + numberPart;
            tokens.push({ text: tokenText, start: i, end: j });
            i = j;
          } else {
            tokens.push({ text: ch, start: i, end: i + 1 });
            i++;
          }
          continue;
        }

        if(ch === '(' || ch === ')' || ch === '%'){
          tokens.push({ text: ch, start: i, end: i + 1 });
          i++;
          continue;
        }

        tokens.push({ text: ch, start: i, end: i + 1 });
        i++;
      }

      return tokens;
    }

    function buildExpressionHTML(){
      const tokens = tokenizeExpression(expression);
      let html = "";
      let probePlaced = false;

      if(tokens.length === 0){
        html = `<span class="cursor-probe" id="cursorProbe">|</span>`;
        return `<div class="expr-line">${html}</div>`;
      }

      for(const token of tokens){
        if(cursorIndex === token.start){
          html += `<span class="cursor-probe" id="cursorProbe">|</span>`;
          probePlaced = true;
        }

        if(cursorIndex > token.start && cursorIndex < token.end){
          const split = cursorIndex - token.start;
          const left = escapeHtml(token.text.slice(0, split));
          const right = escapeHtml(token.text.slice(split));
          html += `<span class="expr-token">${left}<span class="cursor-probe" id="cursorProbe">|</span>${right}</span>`;
          probePlaced = true;
        } else {
          html += `<span class="expr-token">${escapeHtml(token.text)}</span>`;
        }
      }

      if(!probePlaced){
        html += `<span class="cursor-probe" id="cursorProbe">|</span>`;
      }

      return `<div class="expr-line">${html}</div>`;
    }

    function placeCursorOverlay(){
      const oldOverlay = exprView.querySelector(".cursor-overlay");
      if(oldOverlay) oldOverlay.remove();

      const probe = exprView.querySelector("#cursorProbe");
      if(!probe) return;

      const probeRect = probe.getBoundingClientRect();
      const viewRect = exprView.getBoundingClientRect();

      const overlay = document.createElement("div");
      overlay.className = "cursor-overlay";

      const lineHeight = parseFloat(getComputedStyle(exprView).lineHeight) || (probeRect.height || 32);
      overlay.style.height = `${Math.max(lineHeight * 0.96, probeRect.height || 24)}px`;
      overlay.style.left = `${probeRect.left - viewRect.left + exprView.scrollLeft}px`;
      overlay.style.top = `${probeRect.top - viewRect.top + exprView.scrollTop}px`;

      exprView.appendChild(overlay);
      probe.remove();
    }

    function renderExpression(mode = "preserve"){
      const previousScrollTop = exprView.scrollTop;
      exprView.innerHTML = buildExpressionHTML();

      requestAnimationFrame(() => {
        exprView.scrollTop = mode === "bottom" ? exprView.scrollHeight : previousScrollTop;
        placeCursorOverlay();
      });
    }

    function renderAfterEdit(){
      updateResult();
      renderExpression("bottom");
    }

    function renderAfterTap(){
      renderExpression("preserve");
    }

    function insertAtCursor(text){
      expression = expression.slice(0, cursorIndex) + text + expression.slice(cursorIndex);
      cursorIndex += text.length;
      renderAfterEdit();
    }

    function insertOperator(op){
      if(cursorIndex > 0 && cursorIndex === expression.length){
        const prev = expression[cursorIndex - 1];
        if(["+","−","×","÷"].includes(prev)){
          expression = expression.slice(0, cursorIndex - 1) + op;
          renderAfterEdit();
          return;
        }
      }

      if(cursorIndex > 0 && cursorIndex < expression.length){
        const prev = expression[cursorIndex - 1];
        const next = expression[cursorIndex];
        if(["+","−","×","÷"].includes(prev) && !["+","−","×","÷"].includes(next)){
          expression = expression.slice(0, cursorIndex - 1) + op + expression.slice(cursorIndex);
          renderAfterEdit();
          return;
        }
      }

      insertAtCursor(op);
    }

    function insertDot(){
      insertAtCursor(".");
    }

    function insertPercent(){
      insertAtCursor("%");
    }

    function smartBracket(){
      const left = expression.slice(0, cursorIndex);
      const open = (left.match(/\(/g) || []).length;
      const close = (left.match(/\)/g) || []).length;
      const prev = left.slice(-1);

      if(!left || ["+","−","×","÷","("].includes(prev)){
        insertAtCursor("(");
      } else if(open > close){
        insertAtCursor(")");
      } else {
        insertAtCursor("(");
      }
    }

    function backspaceAtCursor(){
      if(cursorIndex <= 0) return;
      expression = expression.slice(0, cursorIndex - 1) + expression.slice(cursorIndex);
      cursorIndex -= 1;
      renderAfterEdit();
    }

    function clearAll(){
      expression = "";
      cursorIndex = 0;
      lastValidResult = "0";
      renderExpression("preserve");
      updateResult();
    }

    function formatResult(v){
      if(v === "") return "0";
      if(typeof v !== "number" || !isFinite(v)) return "Error";
      return Number(v).toLocaleString("en-US", { maximumFractionDigits: 10 });
    }

    function normalize(raw){
      return raw
        .replace(/×/g, "*")
        .replace(/÷/g, "/")
        .replace(/−/g, "-");
    }

    function cleanExpressionForPreview(raw){
      let s = raw.trim();

      while(true){
        const converted = normalize(s);
        if(/[+\-*/.]$/.test(converted)){
          s = s.slice(0, -1).trim();
        } else {
          break;
        }
      }

      while((s.match(/\(/g) || []).length > (s.match(/\)/g) || []).length){
        s = s.slice(0, -1).trim();
      }

      return s;
    }

    function transformPercent(text){
      let s = normalize(text).replace(/\s+/g, "");
      s = s.replace(/(\d+(?:\.\d+)?)%(\d+(?:\.\d+)?)/g, "($1*($2/100))");
      s = s.replace(/(\d+(?:\.\d+)?)([+\-])(\d+(?:\.\d+)?)%/g, "($1$2($1*($3/100)))");
      s = s.replace(/(\d+(?:\.\d+)?)([*/])(\d+(?:\.\d+)?)%/g, "($1$2($3/100))");
      s = s.replace(/(\d+(?:\.\d+)?)%/g, "($1/100)");
      return s;
    }

    function safeEval(text){
      try{
        const expressionText = transformPercent(text.trim());
        if(!expressionText) return "";
        return Function('"use strict"; return (' + expressionText + ')')();
      } catch {
        return null;
      }
    }

    function updateResult(){
      const raw = expression.trim();

      if(raw === ""){
        result.textContent = "0";
        lastValidResult = "0";
        return;
      }

      const previewExpr = cleanExpressionForPreview(raw);

      if(previewExpr === ""){
        result.textContent = lastValidResult;
        return;
      }

      const out = safeEval(previewExpr);

      if(out === null || Number.isNaN(out) || !isFinite(out)){
        result.textContent = lastValidResult;
      } else {
        lastValidResult = formatResult(out);
        result.textContent = lastValidResult;
      }
    }

    function finalAnswer(){
      const previewExpr = cleanExpressionForPreview(expression.trim());
      const out = safeEval(previewExpr);

      if(out === null || out === "" || Number.isNaN(out) || !isFinite(out)) return;

      expression = String(out);
      cursorIndex = expression.length;
      lastValidResult = formatResult(out);
      renderExpression("bottom");
      result.textContent = lastValidResult;
    }

    async function copyResult(){
      const value = result.textContent.trim();
      if(!value) return;

      try{
        await navigator.clipboard.writeText(value);
        showToast("Copied to clipboard");
      } catch {
        const temp = document.createElement("textarea");
        temp.value = value;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        showToast("Copied to clipboard");
      }
    }

    function setTheme(theme, save = true){
      document.documentElement.classList.remove("theme-dark", "theme-light");
      document.documentElement.classList.add(theme);

      if(save){
        localStorage.setItem("calc_theme", theme);
      }

      themeToggleBtn.textContent = theme === "theme-dark" ? "Light Mode" : "Dark Mode";

      const themeColor = theme === "theme-dark" ? "#000000" : "#f5f7fb";
      const meta = document.getElementById("themeColorMeta");
      if(meta) meta.setAttribute("content", themeColor);

      document.documentElement.style.backgroundColor = themeColor;
      document.body.style.backgroundColor = themeColor;
    }

    function toggleTheme(){
      const isDark = document.documentElement.classList.contains("theme-dark");
      setTheme(isDark ? "theme-light" : "theme-dark", true);
      menuDropdown.classList.remove("show");
      renderExpression("preserve");
    }

    function toggleMenu(){
      menuDropdown.classList.toggle("show");
    }

    function closeMenu(){
      menuDropdown.classList.remove("show");
    }

    function setCursorFromPoint(event){
      const x = event.clientX;
      const y = event.clientY;

      let total = 0;
      let found = false;
      const walker = document.createTreeWalker(exprView, NodeFilter.SHOW_TEXT);

      if(document.caretPositionFromPoint){
        const pos = document.caretPositionFromPoint(x, y);
        if(pos && pos.offsetNode && exprView.contains(pos.offsetNode)){
          while(walker.nextNode()){
            const node = walker.currentNode;
            if(node === pos.offsetNode){
              total += pos.offset;
              found = true;
              break;
            }
            total += node.textContent.length;
          }
        }
      } else if(document.caretRangeFromPoint){
        const range = document.caretRangeFromPoint(x, y);
        if(range && range.startContainer && exprView.contains(range.startContainer)){
          while(walker.nextNode()){
            const node = walker.currentNode;
            if(node === range.startContainer){
              total += range.startOffset;
              found = true;
              break;
            }
            total += node.textContent.length;
          }
        }
      }

      cursorIndex = found ? Math.max(0, Math.min(expression.length, total)) : expression.length;
      renderAfterTap();
    }

    copyResultBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      copyResult();
    });

    copyResultBtn.addEventListener("contextmenu", (e) => {
      e.preventDefault();
    });

    menuBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      toggleMenu();
    });

    themeToggleBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      toggleTheme();
    });

    backspaceBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      backspaceAtCursor();
    });

    document.addEventListener("pointerdown", (e) => {
      if (!menuDropdown.contains(e.target) && !menuBtn.contains(e.target)) {
        closeMenu();
      }
    });

    document.addEventListener("contextmenu", (e) => {
      if (
        exprView.contains(e.target) ||
        result.contains(e.target) ||
        copyResultBtn.contains(e.target)
      ) {
        e.preventDefault();
      }
    });

    exprView.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      setCursorFromPoint(e);
    });

    document.querySelectorAll(".grid .btn").forEach(btn => {
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();

        const insert = btn.dataset.insert;
        const action = btn.dataset.action;

        if(insert){
          if(["+","−","×","÷"].includes(insert)){
            insertOperator(insert);
          } else {
            insertAtCursor(insert);
          }
          return;
        }

        if(action === "clear") clearAll();
        if(action === "bracket") smartBracket();
        if(action === "percent") insertPercent();
        if(action === "dot") insertDot();
        if(action === "equals") finalAnswer();
      });
    });

    const savedTheme = localStorage.getItem("calc_theme") || "theme-light";
    setTheme(savedTheme, false);
    renderExpression("preserve");
    updateResult();
  </script>
</body>
</html>

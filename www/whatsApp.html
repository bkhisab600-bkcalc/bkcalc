<!doctype html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>WhatsApp Calculator</title>
  <meta name="theme-color" content="#16a34a">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100%;width:100%}
    body{
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Bengali","Hind Siliguri",sans-serif;
      padding-top:calc(var(--nav-h) + var(--safe-top));
      background:#f3f4f6;
      color:#111827;
    }

    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --nav-h: 64px;
      --shadow-sm: 0 2px 8px rgba(2,6,23,.08);
      --shadow-md: 0 8px 18px rgba(2,6,23,.12);
      --shadow-lg: 0 14px 28px rgba(2,6,23,.14);
      --shadow-2xl: 0 18px 40px rgba(2,6,23,.18);
    }

    .appbar{
      position:fixed;top:0;left:0;right:0;z-index:9999;
      padding-top:var(--safe-top);
      background:linear-gradient(90deg,#16a34a,#06b14f);
      box-shadow:0 10px 28px rgba(2,6,23,.18);
      border-bottom-left-radius:50px;
      border-bottom-right-radius:50px;
    }
    .appbar-inner{
      height:var(--nav-h);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 16px;
    }

    .page{
      max-width:32rem;
      margin:0 auto;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    label{
      display:block;
      margin-bottom:4px;
      font-weight:700;
      color:#111827;
    }

    .hint-card,.results-container,.calc-card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      box-shadow:var(--shadow-lg);
    }

    .hint-card{
      font-size:.875rem;
      line-height:1.45;
      text-align:center;
      padding:12px;
    }

    .space-y-2 > * + *{margin-top:8px}
    .space-y-3 > * + *{margin-top:12px}

    textarea,input{
      width:100%;
      border:1px solid #d1d5db;
      outline:none;
      background:#fff;
      color:#111827;
      transition:border-color .2s ease,box-shadow .2s ease;
    }

    textarea:focus,input:focus{
      box-shadow:0 0 0 2px rgba(59,130,246,.45);
      border-color:#3b82f6;
    }

    .big-paste{min-height:300px}
    .input-main{
      padding:12px;
      border-radius:16px;
      font-size:1rem;
      box-shadow:var(--shadow-lg);
      resize:vertical;
    }
    .input-small{
      padding:10px;
      border-radius:12px;
      font-size:.95rem;
      box-shadow:var(--shadow-md);
    }
    .input-calc{
      padding:12px;
      border-radius:12px;
      font-size:1.125rem;
      font-weight:600;
      box-shadow:var(--shadow-md);
      resize:none;
    }

    .ph-medium::placeholder{
      font-size:.98rem;
      font-weight:500;
      color:rgba(15,23,42,.55);
    }

    .checkbox-card{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:.875rem;
      color:#111827;
      background:#eff6ff;
      padding:12px;
      border-radius:16px;
      box-shadow:var(--shadow-md);
      cursor:pointer;
      transition:background-color .2s ease;
    }
    .checkbox-card:hover{background:#dbeafe}
    .checkbox-card input{
      width:20px;height:20px;accent-color:#3b82f6;flex:0 0 auto;
    }
    .checkbox-card span{font-weight:700;font-size:1rem}

    .btn-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }
    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      font-weight:700;
      border-radius:16px;
      padding:15px 16px;
      color:#fff;
      box-shadow:var(--shadow-md);
      transition:transform .12s ease,filter .2s ease;
      position:relative;
      overflow:hidden;
    }
    .btn:active{transform:scale(.98)}
    .btn.flex-1{flex:1 1 120px}
    .btn.w-full{width:100%}
    .btn-blue{background:linear-gradient(90deg,#3b82f6,#1d4ed8)}
    .btn-gray{background:linear-gradient(90deg,#d1d5db,#9ca3af);color:#111827}
    .btn-green{background:linear-gradient(90deg,#22c55e,#15803d)}
    .btn-blue:hover,.btn-green:hover{filter:brightness(1.05)}

    .results-container{padding:12px}
    .results-title{font-weight:800;margin-bottom:8px;font-size:1rem}
    .results-body{font-size:.875rem;font-weight:600;color:#111827}

    .calc-card{padding:12px}
    .center-title{
      text-align:center;
      font-size:1rem;
      font-weight:800;
      color:#111827;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .calc-grid{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
    }
    .calc-field{width:99%}
    .calc-actions{
      display:flex;
      justify-content:space-between;
      gap:16px;
      margin-top:16px;
    }
    .calc-actions .btn{flex:1}
    .btn-blue-soft{background:linear-gradient(90deg,#3b82f6,#1d4ed8)}
    .btn-gray-soft{background:linear-gradient(90deg,#9ca3af,#6b7280)}

    .summary-box{
      background:#f3f4f6;
      padding:20px;
      border-radius:16px;
      box-shadow:inset 0 2px 10px rgba(2,6,23,.08);
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .summary-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .copy-mini{
      border:none;
      cursor:pointer;
      font-size:.75rem;
      padding:4px 8px;
      border-radius:6px;
      font-weight:700;
      transition:transform .08s ease;
    }
    .copy-mini:active{transform:scale(.98)}
    .copy-blue{background:#dbeafe;color:#1e3a8a}
    .copy-green{background:#dcfce7;color:#166534}
    .copy-purple{background:#f3e8ff;color:#581c87}

    .text-main{color:#111827}
    .text-red{color:#b91c1c}
    .text-red-soft{color:#b91c1c}

    .font-bold{font-weight:700}
    .font-extrabold{font-weight:800}
    .text-xs{font-size:.75rem}
    .text-sm{font-size:.875rem}
    .text-base{font-size:1rem}
    .text-lg{font-size:1.125rem}
    .text-xl{font-size:1.25rem}
    .mt-1{margin-top:4px}
    .mt-2{margin-top:8px}
    .mt-3{margin-top:12px}
    .mb-1{margin-bottom:4px}

    .force-black{color:#0b1220 !important}
    .force-black *{color:#0b1220 !important}

    .inline-scroll-wrap{
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      border:1px solid #d1d5db;
      border-radius:10px;
      background:#f9fafb;
      padding:6px 8px;
    }
    .inline-row{
      white-space:nowrap;
      min-width:max-content;
      font-weight:700;
      line-height:1.6;
      font-size:12px;
    }
    .inline-scroll-wrap::-webkit-scrollbar{height:7px}
    .inline-scroll-wrap::-webkit-scrollbar-thumb{
      background:rgba(100,116,139,.45);
      border-radius:999px;
    }

    .mismatch-box{
      background:#fef2f2;
      border:1px solid #fecaca;
      border-radius:10px;
      padding:10px;
      font-size:.75rem;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .item-box{
      border-radius:20px;
      border:1px solid #e5e7eb;
      background:#f9fafb;
      padding:10px;
      box-shadow:var(--shadow-sm);
    }

    .status-ok,.status-fail{
      border-radius:10px;
      padding:12px;
      border:1px solid;
    }
    .status-ok{
      background:#f0fdf4;
      border-color:#bbf7d0;
      color:#15803d;
    }
    .status-fail{
      background:#fef2f2;
      border-color:#fecaca;
      color:#b91c1c;
    }

    .pill-total{
      margin-top:12px;
      padding:8px 12px;
      border-radius:12px;
      box-shadow:var(--shadow-sm);
      font-weight:800;
      font-size:1.25rem;
      background:#f0fdf4;
      color:#15803d;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:10000;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.5);
      padding:16px;
    }
    .modal-backdrop.show{display:flex}
    .modal-card{
      width:100%;
      max-width:28rem;
      border-radius:16px;
      background:#fff;
      box-shadow:var(--shadow-2xl);
      border:1px solid #e5e7eb;
    }
    .modal-head{
      padding:12px;
      border-bottom:1px solid #e5e7eb;
    }
    .modal-body{padding:12px}
    .modal-actions{
      padding:12px;
      padding-top:0;
      display:flex;
      gap:12px;
      justify-content:flex-end;
    }
    .btn-cancel{
      padding:8px 16px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      background:#e5e7eb;
      color:#111827;
      font-weight:700;
    }
    .btn-save{
      padding:8px 16px;
      border-radius:12px;
      border:none;
      cursor:pointer;
      background:#2563eb;
      color:#fff;
      font-weight:700;
    }

    .ripple{position:relative;overflow:hidden}
    .ripple span{
      position:absolute;
      border-radius:50%;
      transform:scale(0);
      animation:ripple 0.6s linear;
      background-color:rgba(255,255,255,0.6);
      pointer-events:none;
    }
    @keyframes ripple{to{transform:scale(3.5);opacity:0}}

    @media (max-width:480px){
      .page{padding:10px}
      .btn-row{gap:10px}
      .calc-actions{gap:10px}
    }
  </style>
</head>

<body>
  <nav class="appbar">
    <div class="appbar-inner">
      <h1 class="font-extrabold text-lg" style="tracking-wide;color:#fff">📱 WhatsApp Calculator</h1>
      <div style="width:24px"></div>
    </div>
  </nav>

  <div class="page">
    <p class="hint-card">
      WhatsApp থেকে নাম্বার ও এমাউন্ট কপি করে এখানে Paste করো — অ্যাপ নিজে হিসাব করবে।
    </p>

    <div class="space-y-2">
      <div>
        <label>পেস্ট করুন</label>
        <textarea id="input" rows="8"
          placeholder="WhatsApp থেকে নাম্বার সাথে এমাউন্ট সহ সব একসাথে কপি পেস্ট করুন। যেমন 019777222=10200 018633333+20400 ⇨  বিকাশ নাম্বার টু এমাউন্ট হিসাব।"
          class="big-paste ph-medium input-main"></textarea>
      </div>

      <div>
        <input
          id="extraInput"
          type="text"
          inputmode="text"
          lang="en"
          autocapitalize="off"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Extra Add যেমন: 200+5100+500"
          class="ph-medium input-small"
        >
      </div>
    </div>

    <div>
      <label class="checkbox-card">
        <input type="checkbox" id="toggleTotal">
        <span>Highly Check</span>
      </label>
    </div>

    <div class="btn-row">
      <button id="parseBtn" class="btn btn-blue ripple flex-1">Result</button>
      <button id="clearBtn" class="btn btn-gray ripple flex-1">Clear</button>
      <button id="copyBtn" class="btn btn-green ripple w-full">মোট কপি</button>
    </div>

    <div id="resultsContainer" class="results-container">
      <h2 class="results-title">ফলাফল</h2>
      <div id="results" class="results-body">
        কোনো আইটেম পাওয়া যায়নি — Result চাপুন।
      </div>
    </div>

    <section class="calc-card space-y-3">
      <p class="center-title">💰 যোগ-বিয়োগ ক্যালকুলেটর</p>

      <div class="calc-grid">
        <div class="calc-field">
          <label for="bikash">বিকাশ / ব্যাংক:</label>
          <textarea id="bikash" rows="3" placeholder="10000+20000+50000+" class="ph-medium input-calc"></textarea>
        </div>

        <div class="calc-field">
          <label for="joma">জমা:</label>
          <textarea id="joma" rows="3" placeholder="5000+100+8000" class="ph-medium input-calc"></textarea>
        </div>
      </div>

      <div class="calc-actions">
        <button onclick="calculate()" class="btn btn-blue-soft ripple">হিসাব করুন</button>
        <button onclick="clearAll()" class="btn btn-gray-soft ripple">Clear</button>
      </div>

      <div class="summary-box">
        <div class="summary-row">
          <span id="totalBikash" class="text-main font-bold">মোট বিকাশ: 0</span>
          <button onclick="copyNumber('totalBikash')" class="copy-mini copy-blue ripple">Copy</button>
        </div>
        <div class="summary-row">
          <span id="totalJoma" class="text-main font-bold">মোট জমা: 0</span>
          <button onclick="copyNumber('totalJoma')" class="copy-mini copy-green ripple">Copy</button>
        </div>
        <div class="summary-row">
          <span id="finalResult" class="text-main font-extrabold">চূড়ান্ত মোট: 0</span>
          <button onclick="copyNumber('finalResult')" class="copy-mini copy-purple ripple">Copy</button>
        </div>
      </div>
    </section>
  </div>

  <div id="editModal" class="modal-backdrop">
    <div class="modal-card">
      <div class="modal-head">
        <h3 class="text-base font-extrabold text-main">লাইন এডিট করুন</h3>
      </div>

      <div class="modal-body">
        <textarea
          id="editModalInput"
          rows="5"
          class="input-main"
          style="resize:none;box-shadow:var(--shadow-sm)"
          placeholder="এখানে লাইন এডিট করুন"
        ></textarea>
      </div>

      <div class="modal-actions">
        <button id="editModalCancel" class="btn-cancel">Cancel</button>
        <button id="editModalSave" class="btn-save">Save</button>
      </div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  const inputEl = $("input");
  const extraInputEl = $("extraInput");
  const toggleTotal = $("toggleTotal");
  const results = $("results");
  const parseBtn = $("parseBtn");
  const clearBtn = $("clearBtn");
  const copyBtn = $("copyBtn");
  const editModal = $("editModal");
  const editModalInput = $("editModalInput");
  const editModalCancel = $("editModalCancel");
  const editModalSave = $("editModalSave");
  const bikashEl = $("bikash");
  const jomaEl = $("joma");
  const totalBikashEl = $("totalBikash");
  const totalJomaEl = $("totalJoma");
  const finalResultEl = $("finalResult");

  document.addEventListener('click', function(e){
    const btn = e.target.closest('.ripple');
    if(!btn) return;
    const circle=document.createElement('span');
    const rect=btn.getBoundingClientRect();
    const diameter=Math.max(btn.clientWidth,btn.clientHeight);
    const x=e.clientX - rect.left - diameter/2;
    const y=e.clientY - rect.top - diameter/2;
    circle.style.width=circle.style.height=`${diameter}px`;
    circle.style.left=`${x}px`;
    circle.style.top=`${y}px`;
    btn.appendChild(circle);
    setTimeout(()=>circle.remove(),600);
  }, {passive:true});

  function savePageScroll() {
    return { x: window.scrollX || 0, y: window.scrollY || window.pageYOffset || 0 };
  }

  function restorePageScroll(pos) {
    if (!pos) return;
    requestAnimationFrame(() => {
      window.scrollTo(pos.x, pos.y);
      requestAnimationFrame(() => window.scrollTo(pos.x, pos.y));
    });
  }

  function stripInvisibles(s){
    return String(s || '').replace(/[\u200B-\u200D\u2060\uFEFF\u200E\u200F\u202A-\u202E]/g, '');
  }

  function escapeHtml(str){
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function bnToEnDigits(str){
    const map={'০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9'};
    return String(str || '').replace(/[০-৯]/g, d=>map[d]);
  }

  function autoFixDigits(str){
    return String(str || '')
      .replace(/[—–−]/g,'-')
      .replace(/[lI|]/g,'1');
  }

  function normalizeBasic(str){
    return autoFixDigits(bnToEnDigits(stripInvisibles(str || '')));
  }

  function formatNumber(n){
    return isNaN(n) ? "0" : Number(n).toLocaleString("en-US",{maximumFractionDigits:2});
  }

  function preprocessWhatsAppText(input){
    const lines = String(input || '').split(/\r?\n/);
    const cleaned = [];

    for(let line of lines){
      let s = stripInvisibles(line || '').trim();
      if(!s) continue;

      while (/^\[\d{1,2}\/\d{1,2},\s*\d{1,2}:\d{2}\s*(?:am|pm)?\]\s*[^:\n]*:\s*/i.test(s)) {
        s = s.replace(/^\[\d{1,2}\/\d{1,2},\s*\d{1,2}:\d{2}\s*(?:am|pm)?\]\s*[^:\n]*:\s*/i, '').trim();
      }

      if (/^\[\d{1,2}\/\d{1,2},\s*\d{1,2}:\d{2}\s*(?:am|pm)?\]\s*[^:\n]*:?$/i.test(s)) {
        continue;
      }

      if(!s) continue;
      cleaned.push(s);
    }

    return cleaned.join('\n');
  }

  function compactDisplayLine(text){
    return String(text || '')
      .replace(/\n{2,}/g, '\n')
      .replace(/[ \t]+/g, ' ')
      .trim();
  }

  function parseExtraInputValue(){
    let v = normalizeBasic(extraInputEl?.value || '');
    v = v.replace(/[^\d+]/g, '');
    if(extraInputEl) extraInputEl.value = v;
    if(!v) return 0;
    return v.split('+').filter(Boolean).reduce((a,n)=>a+(parseInt(n,10)||0),0);
  }

  function extractAmountTokens(text){
    let s = normalizeBasic(text || '');

    s = s.replace(/\btk\b/ig, ' ');
    s = s.replace(/৳/g, ' ');
    s = s.replace(/\/-/g, ' ');

    // dot থাকলে mismatch
    if (/\d+\.\d+/.test(s)) return null;

    // শুধু comma ignore
    // 10,200 => 10200
    s = s.replace(/(\d),+(?=\d)/g, '$1');

    // = আর : separator
    s = s.replace(/[=:]/g, ' ');

    const nums = s.match(/\d+/g) || [];

    return nums
      .map(n => parseInt(n, 10))
      .filter(n => !isNaN(n) && n > 0);
  }

  function banglaReason(reason){
    const map = {
      'Phone not found': 'ফোন নাম্বার পাওয়া যায়নি',
      'Amount missing': 'এমাউন্ট পাওয়া যায়নি',
      'Double amount / invalid amount': 'দুইটা এমাউন্ট বা ভুল এমাউন্ট',
      'Invalid / confusing amount': 'এমাউন্ট কনফিউজিং, তাই মিসম্যাচ',
      'Still mismatch after edit': 'এডিটের পরও ঠিক হয়নি',
      'Highly check-এ count মিলছে না': 'Highly check-এ count মিলছে না',
      'Highly check-এ মোট মিলছে না': 'Highly check-এ মোট মিলছে না'
    };
    return map[reason] || reason || 'মিসম্যাচ';
  }

  function parsePhoneOccurrences(input){
    const src = String(input || '');
    const matches = [];

    // space allowed না
    const re = /(?:\+880|00880|880|0|O)[_\-\/]*1[_\-\/]*[3-9](?:[_\-\/]*\d){8}\b/g;

    let m;
    while((m = re.exec(src)) !== null){
      matches.push({
        raw: m[0],
        index: m.index,
        end: m.index + m[0].length
      });
    }

    return { src, matches };
  }

  function canonicalPhone(raw){
    let s = String(raw || '').trim();

    if(/^O/i.test(s)) s = '0' + s.slice(1);
    s = s.replace(/[^\d]/g, '');

    if(s.startsWith('0088')) s = s.slice(4);
    else if(s.startsWith('880')) s = s.slice(3);
    else if(s.startsWith('88')) s = s.slice(2);

    return s;
  }

  function buildParsedItem(rawText, phone, amount){
    return { raw: rawText, lines: compactDisplayLine(rawText), phone, amount };
  }

  function makeMismatch(rawText, idx, reason){
    return { line: compactDisplayLine(rawText), idx, raw: rawText, reason };
  }

  function parseBlocks(input){
    const original = preprocessWhatsAppText(input || '');
    const { src, matches } = parsePhoneOccurrences(original);
    const parsed = [];
    const misses = [];

    if(matches.length === 0){
      const lines = original.split(/\r?\n+/).map(v=>v.trim()).filter(Boolean);
      lines.forEach((line, idx)=>{
        if(/\d/.test(normalizeBasic(line))){
          misses.push(makeMismatch(line, idx + 1, 'Phone not found'));
        }
      });
      return { parsed, misses };
    }

    const firstPrefix = src.slice(0, matches[0].index).trim();
    if(firstPrefix && /\d/.test(normalizeBasic(firstPrefix))){
      misses.push(makeMismatch(firstPrefix, 1, 'Phone not found'));
    }

    for(let i=0;i<matches.length;i++){
      const cur = matches[i];
      const next = matches[i+1];
      const blockStart = cur.index;
      const blockEnd = next ? next.index : src.length;

      const rawBlock = src.slice(blockStart, blockEnd).trim();
      const phone = canonicalPhone(cur.raw);
      const phoneLen = cur.raw.length;
      const tail = rawBlock.slice(phoneLen).trim();

      const amounts = extractAmountTokens(tail);

      if(amounts === null){
        misses.push(makeMismatch(rawBlock, i + 1, 'Invalid / confusing amount'));
      } else if(amounts.length === 1){
        parsed.push(buildParsedItem(rawBlock, phone, amounts[0]));
      } else if(amounts.length === 0){
        misses.push(makeMismatch(rawBlock, i + 1, 'Amount missing'));
      } else {
        misses.push(makeMismatch(rawBlock, i + 1, 'Double amount / invalid amount'));
      }
    }

    return { parsed, misses };
  }

  function parseText(input){
    return parseBlocks(input);
  }

  function runHighlyCheckVerify(input, parsedItems){
    const cleaned = preprocessWhatsAppText(input);
    const out = parseBlocks(cleaned);
    const issues = out.misses.map(m => ({ line: m.line, reason: m.reason }));

    const mainCount = parsedItems.length;
    const checkCount = out.parsed.length;
    if(mainCount !== checkCount){
      issues.push({
        line: `Main: ${mainCount}, Highly Check: ${checkCount}`,
        reason: 'Highly check-এ count মিলছে না'
      });
    }

    const mainTotal = parsedItems.reduce((s,it)=>s+(Number(it.amount)||0),0);
    const checkTotal = out.parsed.reduce((s,it)=>s+(Number(it.amount)||0),0);
    if(mainTotal !== checkTotal){
      issues.push({
        line: `Main: ${formatNumber(mainTotal)}, Highly Check: ${formatNumber(checkTotal)}`,
        reason: 'Highly check-এ মোট মিলছে না'
      });
    }

    return { checkedItems: out.parsed, issues };
  }

  let items = [], misses = [], highCheckIssues = [], highCheckedItems = [], highCheckSuccessMsg = "", editVerifyFailMsg = "";

  function replaceOriginalInputLine(oldRaw, newRaw){
    const current = String(inputEl.value || "");
    const oldText = String(oldRaw || "");
    const newText = String(newRaw || "");
    if (!oldText) return;
    if (current.includes(oldText)) {
      inputEl.value = current.replace(oldText, newText);
    }
  }

  function rerunAfterEdit(){
    const scrollPos = savePageScroll();

    const cleanedInput = preprocessWhatsAppText(inputEl.value);
    inputEl.value = cleanedInput;

    const out = parseText(cleanedInput);
    items = out.parsed;
    misses = out.misses;

    const verify = runHighlyCheckVerify(cleanedInput, items);
    highCheckedItems = verify.checkedItems || [];
    highCheckIssues = [];

    if ((out.misses || []).length === 0 && (verify.issues || []).length === 0 && items.length > 0) {
      highCheckSuccessMsg = "সফলভাবে মিলেছে";
      editVerifyFailMsg = "";
    } else {
      highCheckSuccessMsg = "";
      editVerifyFailMsg = "এডিটের পরও কিছু সমস্যা আছে";
    }

    render();
    restorePageScroll(scrollPos);
  }

  let currentEditMode = null;
  let currentEditOldRaw = "";

  function openEditModal(oldValue, mode){
    currentEditMode = mode;
    currentEditOldRaw = String(oldValue || "");
    editModalInput.value = currentEditOldRaw;
    editModal.classList.add("show");
    setTimeout(() => {
      editModalInput.focus();
      editModalInput.setSelectionRange(editModalInput.value.length, editModalInput.value.length);
    }, 20);
  }

  function closeEditModal(){
    editModal.classList.remove("show");
    editModalInput.value = "";
    currentEditMode = null;
    currentEditOldRaw = "";
  }

  function saveEditModal(){
    const newVal = editModalInput.value.trim();
    if(!newVal){
      closeEditModal();
      return;
    }

    inputEl.value = preprocessWhatsAppText(inputEl.value);

    if(currentEditMode === "item" || currentEditMode === "miss"){
      replaceOriginalInputLine(currentEditOldRaw, newVal);
    }

    closeEditModal();
    rerunAfterEdit();
  }

  editModalCancel.addEventListener("click", closeEditModal);
  editModalSave.addEventListener("click", saveEditModal);
  editModal.addEventListener("click", function(e){
    if(e.target === editModal) closeEditModal();
  });
  editModalInput.addEventListener("keydown", function(e){
    if(e.key === "Escape") closeEditModal();
  });

  function render(){
    if(items.length===0 && misses.length===0 && highCheckIssues.length===0 && !highCheckSuccessMsg && !editVerifyFailMsg){
      results.innerHTML='<p class="force-black font-bold">কোনো আইটেম পাওয়া যায়নি — Result চাপুন।</p>';
      return;
    }

    const parsedTotal = items.reduce((s,it)=>s+(Number(it.amount)||0),0);
    const extraTotal = parseExtraInputValue();
    const finalTotal = parsedTotal + extraTotal;

    let html = "";

    if(toggleTotal.checked && items.length){
      html += "<div class='space-y-2 force-black'>";
      items.forEach((it,idx)=>{
        html += `
          <div class="item-box">
            <div ondblclick="editLine(${idx})" style="cursor:pointer">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px">
                <div class="font-extrabold text-xs">আইটেম ${idx+1}</div>
                <div style="flex-shrink:0;text-align:right;font-weight:800;font-size:16px;line-height:1">
                  ৳ ${formatNumber(it.amount)}
                </div>
              </div>
              <div style="width:100%;white-space:normal;word-break:break-word;font-size:14px;font-weight:800;line-height:1.28">
                ${escapeHtml(compactDisplayLine(it.raw))}
              </div>
            </div>
          </div>
        `;
      });
      html += `</div>`;
      html += `<div class="pill-total">মোট : ${formatNumber(parsedTotal)}</div>`;
    }

    if(highCheckSuccessMsg){
      html += `<div class="mt-3">
        <div class="status-ok">
          <div class="font-extrabold text-sm">✅ ${escapeHtml(highCheckSuccessMsg)}</div>
          <div class="text-xs mt-1 font-bold">সবকিছু ঠিক আছে</div>
        </div>
      </div>`;
    }

    if(editVerifyFailMsg){
      html += `<div class="mt-3">
        <div class="status-fail">
          <div class="font-extrabold text-sm">❌ ${escapeHtml(editVerifyFailMsg)}</div>
          <div class="text-xs mt-1 font-bold">সব warning ঠিক হলে তবেই সফলভাবে মিলেছে দেখাবে</div>
        </div>
      </div>`;
    }

    if(misses.length){
      html += `<div class="mt-3">
        <div class="font-extrabold text-red mb-1 text-sm">মিসম্যাচ (${misses.length})</div>
        <ul class="space-y-2">`;
      misses.forEach((miss,idx)=>{
        html += `<li class="mismatch-box">
          <div style="flex:1;word-break:break-all">
            <span class="text-red font-extrabold" style="margin-right:4px">(${miss.idx}) ✖</span>${escapeHtml(miss.line)}
            <div class="text-xs mt-1 text-red-soft font-bold">${escapeHtml(banglaReason(miss.reason))}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <button onclick="editMiss(${idx})" class="copy-mini ripple" style="background:#e5e7eb;color:#111827">✏️ Edit</button>
          </div>
        </li>`;
      });
      html += `</ul></div>`;
    }

    html += `<div class="mt-3 force-black">
      <div class="font-extrabold text-sm mb-1">ধাপে ধাপে যোগ:</div>
      <div class="inline-scroll-wrap">`;

    let running = 0;
    items.forEach((it,idx)=>{
      running += Number(it.amount)||0;
      html += `<div class="inline-row">${idx+1}. ${escapeHtml(it.phone)} + ${formatNumber(it.amount)} => মোট: ${formatNumber(running)}</div>`;
    });

    if(extraTotal > 0){
      running += extraTotal;
      html += `<div class="inline-row" style="color:#15803d">+ Extra Add (${escapeHtml(extraInputEl.value)}) => ${formatNumber(extraTotal)} => মোট: ${formatNumber(running)}</div>`;
    }

    html += `</div></div>`;

    html += `<div class="mt-3 force-black space-y-2">
      <div class="font-bold text-sm"> মোট: ${formatNumber(parsedTotal)} ৳</div>
      <div class="font-bold text-sm">Extra Add: ${formatNumber(extraTotal)} ৳</div>
    </div>`;

    html += `<div class="text-xl font-extrabold mt-3" style="color:#15803d;background:#f0fdf4;padding:8px 12px;border-radius:12px;box-shadow:var(--shadow-sm)">
      চূড়ান্ত মোট: ${formatNumber(finalTotal)} ৳
      <button onclick="copyTotalNow(${finalTotal})"
      class='copy-mini ripple' style="margin-left:8px;background:#f3e8ff;color:#581c87">মোট কপি</button>
    </div>`;

    results.innerHTML = html;
  }

  function editLine(idx){
    const oldRaw = (items[idx]?.raw ?? items[idx]?.lines ?? "").toString();
    openEditModal(oldRaw.trim() ? oldRaw : (items[idx]?.lines || "").toString(), "item");
  }

  function editMiss(idx){
    const oldRaw = (misses[idx]?.raw ?? misses[idx]?.line ?? "").toString();
    openEditModal(oldRaw.trim() ? oldRaw : (misses[idx]?.line || "").toString(), "miss");
  }

  function runParse(){
    const scrollPos = savePageScroll();

    const cleanedInput = preprocessWhatsAppText(inputEl.value);
    inputEl.value = cleanedInput;

    const out = parseText(cleanedInput);
    items = out.parsed;
    misses = out.misses;

    const verify = runHighlyCheckVerify(cleanedInput, items);
    highCheckIssues = verify.issues;
    highCheckedItems = verify.checkedItems;

    highCheckSuccessMsg = "";
    editVerifyFailMsg = "";
    render();
    restorePageScroll(scrollPos);
  }

  parseBtn.onclick = function(e){
    e.preventDefault();
    runParse();
  };

  clearBtn.onclick = ()=>{
    const scrollPos = savePageScroll();
    inputEl.value = "";
    extraInputEl.value = "";
    items = [];
    misses = [];
    highCheckIssues = [];
    highCheckedItems = [];
    highCheckSuccessMsg = "";
    editVerifyFailMsg = "";
    render();
    restorePageScroll(scrollPos);
  };

  copyBtn.onclick = ()=>{
    const parsedTotal = items.reduce((s,it)=>s+(Number(it.amount)||0),0);
    const extraTotal = parseExtraInputValue();
    const total = parsedTotal + extraTotal;

    navigator.clipboard.writeText(String(total))
      .then(()=>alert("মোট কপি হয়েছে: " + formatNumber(total)))
      .catch(()=>alert("কপি করা যায়নি — অনুমতি দিন"));
  };

  extraInputEl.addEventListener("input", render);
  toggleTotal.addEventListener('change', render);

  function copyTotalNow(total){
    navigator.clipboard.writeText(String(total))
      .then(()=>alert("কপি হয়েছে: " + formatNumber(total) + " ৳"))
      .catch(()=>alert("কপি করা যায়নি"));
  }

  function _normalize(v){ return (v || "").replace(/[.,\s]/g, ""); }
  function sumInput(v){
    v = _normalize(v);
    if(!v) return 0;
    return v.split('+').filter(Boolean).reduce((a, n) => a + (parseInt(n, 10) || 0), 0);
  }

  function calculate(){
    bikashEl.value = _normalize(bikashEl.value).replace(/[^\d+]/g, "");
    jomaEl.value   = _normalize(jomaEl.value).replace(/[^\d+]/g, "");
    const tB = sumInput(bikashEl.value);
    const tJ = sumInput(jomaEl.value);
    totalBikashEl.innerText = "মোট বিকাশ: " + tB;
    totalJomaEl.innerText   = "মোট জমা: " + tJ;
    finalResultEl.innerText = "চূড়ান্ত মোট: " + (tB - tJ);
  }

  function clearAll(){
    const scrollPos = savePageScroll();
    bikashEl.value = "";
    jomaEl.value   = "";
    totalBikashEl.innerText = "মোট বিকাশ: 0";
    totalJomaEl.innerText   = "মোট জমা: 0";
    finalResultEl.innerText = "চূড়ান্ত মোট: 0";
    restorePageScroll(scrollPos);
  }

  function copyNumber(id){
    const text = $(id).innerText || "";
    const parts = text.split(':');
    const number = (parts[1] || "").trim();
    navigator.clipboard.writeText(number);
    alert("কপি হয়েছে: " + number);
  }

  render();
</script>
</body>
</html>
